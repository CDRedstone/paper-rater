<!DOCTYPE html>
<html>
  <head>
    <title>Paper Rater</title>
  </head>

  
  <header>
    <div id="headerleftcontainer">
      <h1 id="classroomtitle">Paper Rater</h1>
    </div>
    <div id="headerrightcontainer">
      
    </div>
  </header>

  
  <body>
    <div id="bodywhitecontainercontainer">
      <div id="bodywhitecontainer">
        
      </div>
    </div>
  </body>

  
  <style>
    header {
      display: block;
      background-color: #f8fafd;
      height: 40px;
    }
    body {
      background-color: #f8fafd;
    }
    #bodywhitecontainercontainer {
      position: relative;
      height: 100vh;
      width: 100vw;
      margin: 0 0 0 0;
      padding: 0 0 0 0;
      visibility: hidden;
      display: block;
    }
    #bodywhitecontainer {
      background-color: #ffffff;
      border-top-left-radius: 30px;
      position: absolute;
      bottom: 0;
      right: 0;
      width: calc(100vw - 40px);
      height: calc(100vh - 15px);
      visibility: visible;
      display: block;
    }

    header {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    #classroomtitle {
      
    }
  </style>
</html>
