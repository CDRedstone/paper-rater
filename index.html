<!DOCTYPE html>
<html>
  <head>
    <title>Paper Rater</title>
  </head>

  
  <header>
      <h1>Paper Rater</h1>
  </header>

  
  <body>
    <div id="bodywhitecontainercontainer">
      <div id="bodywhitecontainer">
        
      </div>
    </div>
  </body>

  
  <style>
    header {
      display: block;
      background-color: #f8fafd;
      height: 40px;
    }
    body {
      background-color: #f8fafd;
    }
    #bodywhitecontainercontainer {
      position: relative;
      height: 100vh;
      width: 100vw;
      margin: 0 0 0 0;
      padding: 0 0 0 0;
      visibility: hidden;
      display: block;
    }
    #bodywhitecontainer {
      background-color: #ffffff;
      border-top-left-radius: 20px;
      position: absolute;
      bottom: 0;
      right: 0;
      width: calc(100vw - 50px);
      height: calc(100vh - 50px);
      visibility: visible;
      display: block;
    }
  </style>
</html>
